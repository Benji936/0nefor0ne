name: Refresh Yugipedia manifests

# Re-crawls Yugipedia "Card Tips" pages and the current Forbidden & Limited Lists,
# regenerating the static manifests (frontend/public/yugipedia-tips.json +
# yugipedia-searchers.json + yugipedia-banlist.json), then commits them only if
# they changed. The push triggers Vercel to redeploy automatically.
#
# The crawler is a polite batch job (~1 req/sec) using only Node built-ins +
# global fetch — no dependency install needed.

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC — change cadence here
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Don't let two refresh runs race each other.
concurrency:
  group: refresh-yugipedia
  cancel-in-progress: false

permissions:
  contents: write # needed to commit the regenerated manifests

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Crawl Yugipedia and regenerate manifests
        working-directory: frontend
        run: |
          node scripts/yugipedia-tips.mjs
          node scripts/yugipedia-banlist.mjs

      - name: Sanity-check manifest size
        working-directory: frontend
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            const read = (s) => { try { return JSON.parse(s); } catch { return {}; } };
            const cur = read(fs.readFileSync("public/yugipedia-searchers.json", "utf8"));
            let prev = {};
            try { prev = read(execSync("git show HEAD:frontend/public/yugipedia-searchers.json").toString()); } catch {}
            const c = Object.keys(cur).length, p = Object.keys(prev).length;
            console.log(`searchers manifest: prev=${p} new=${c}`);
            if (p > 0 && c < p * 0.9) {
              console.error("Refusing to commit: manifest shrank >10% — likely a degraded crawl. Not committing.");
              process.exit(1);
            }
            // Banlist is small (~hundreds of passcodes); a near-empty result means a
            // degraded crawl, not a real list with zero restricted cards.
            const bl = read(fs.readFileSync("public/yugipedia-banlist.json", "utf8"));
            const b = Object.keys(bl).length;
            console.log(`banlist manifest: ${b} entries`);
            if (b < 50) {
              console.error("Refusing to commit: banlist manifest has <50 entries — likely a degraded crawl.");
              process.exit(1);
            }
          '

      - name: Commit refreshed manifests (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/yugipedia-tips.json frontend/public/yugipedia-searchers.json frontend/public/yugipedia-banlist.json
          if git diff --cached --quiet; then
            echo "No manifest changes — nothing to commit."
          else
            git commit -m "chore(data): refresh Yugipedia tips + searchers + banlist manifests"
            git push
          fi
