name: Sync Yu-Gi-Oh card images to R2

on:
  schedule:
    # Every Monday at 03:00 UTC. New Yu-Gi-Oh sets release roughly every 2-3
    # months, so weekly is more than enough.
    - cron: "0 3 * * 1"
  workflow_dispatch: # also let me trigger manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Sync new card images
        run: npm run cards:sync
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
